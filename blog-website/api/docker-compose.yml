services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: blog
      POSTGRES_DB: blog_website
    ports:
      - "${DEV_DB_PORT:-5432}:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog -d blog_website"]
      interval: 2s
      timeout: 5s
      retries: 30

volumes:
  postgres_dev_data:
